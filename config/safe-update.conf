# This file is sourced by Bash, so only place trusted shell assignments here.
# Runtime settings
SAFE_UPDATE_DATA_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/safe-update"

# Command overrides
CHECKUPDATES_BIN="checkupdates"
PARU_BIN="paru"

# Feature flags
ENABLE_NOTIFICATIONS=true
ENABLE_ARCH_NEWS=true
ENABLE_CACHYOS_NEWS=true
ENABLE_REPORTS=true

# Snapshot retention groundwork
TIMELINE_RETENTION=6
UPDATE_SNAPSHOT_RETENTION=5
